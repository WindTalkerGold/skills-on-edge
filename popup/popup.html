<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skills on Edge</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Skills on Edge</h1>
      <div class="header-selects">
        <select id="provider-select"></select>
        <select id="lang-select"></select>
      </div>
    </header>

    <section id="skills-list"></section>

    <section id="output" class="hidden">
      <div id="result"></div>
      <div class="output-actions">
        <button id="copy-output" class="secondary-btn">Copy</button>
        <button id="popout-output" class="secondary-btn">Pop Out</button>
        <button id="close-output" class="secondary-btn">Close</button>
      </div>
    </section>

    <section id="hover-mode" class="hover-mode-panel">
      <div class="hover-mode-header">
        <span>C# Symbol Hover</span>
        <label class="toggle-switch">
          <input type="checkbox" id="hover-toggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="hover-mode-controls hidden" id="hover-controls">
        <div class="hover-mode-row">
          <label for="solution-select">Solution alias</label>
          <input type="text" id="solution-select" placeholder="e.g. my-solution" class="input">
        </div>
        <div class="hover-mode-row">
          <label for="hover-delay">Delay (s)</label>
          <input type="number" id="hover-delay" value="3" min="1" max="10" step="0.5">
        </div>
      </div>
    </section>

    <section id="stats-panel" class="hidden">
      <div class="stats-header">
        <span>Usage Statistics</span>
        <button id="close-stats" class="secondary-btn">Close</button>
      </div>
      <div id="stats-content"></div>
    </section>

    <footer>
      <a href="#" id="stats-link">Stats</a>
      <span class="footer-sep">|</span>
      <a href="#" id="settings-link">Settings</a>
    </footer>
  </div>

  <script src="../lib/providers.js"></script>
  <script src="../lib/skills.js"></script>
  <script src="../lib/template-engine.js"></script>
  <script src="../lib/skill-loader.js"></script>
  <script src="popup.js"></script>
</body>
</html>
