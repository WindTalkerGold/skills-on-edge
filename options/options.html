<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skills on Edge - Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>Skills on Edge Settings</h1>

    <section class="section">
      <h2>AI Providers</h2>
      <p class="hint">Configure API keys for your preferred AI providers. All providers use OpenAI-compatible endpoints.</p>
      <div id="provider-list"></div>
      <button id="add-custom" class="btn btn-secondary">+ Add Custom Endpoint</button>
    </section>

    <section class="section">
      <h2>Default Provider</h2>
      <select id="default-provider" class="select"></select>
    </section>

    <section class="section">
      <h2>User Skills</h2>
      <p class="hint">Import custom skill definitions (JSON files) to extend the extension with your own AI workflows.</p>
      <div id="user-skills-list"></div>
      <button id="import-skill" class="btn btn-secondary">Import Skill from JSON</button>
      <input type="file" id="skill-file-input" accept=".json" style="display:none">
    </section>

    <div id="status" class="status hidden"></div>
  </div>

  <script src="../lib/providers.js"></script>
  <script src="../lib/skill-loader.js"></script>
  <script src="options.js"></script>
</body>
</html>
